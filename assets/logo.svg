<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" width="460" height="120" role="img" aria-label="needle-rs">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8633F"/>
      <stop offset="55%" stop-color="#CE422B"/>
      <stop offset="100%" stop-color="#A8341F"/>
    </linearGradient>
    <linearGradient id="hexShine" x1="25%" y1="0%" x2="75%" y2="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <mask id="needleEye">
      <rect width="100%" height="100%" fill="white"/>
      <ellipse cx="62" cy="72" rx="1.5" ry="3.2" fill="black"/>
    </mask>
  </defs>

  <!-- GitHub-dark background card -->
  <rect width="460" height="120" rx="14" ry="14" fill="#0D1117"/>

  <!-- Hex (pointy-top), center (62,60), r=34 -->
  <polygon points="62,26 91.4,43 91.4,77 62,94 32.6,77 32.6,43" fill="url(#hexGrad)"/>
  <polygon points="62,26 91.4,43 91.4,77 62,94 32.6,77 32.6,43" fill="url(#hexShine)"/>
  <polygon points="62,26 91.4,43 91.4,77 62,94 32.6,77 32.6,43"
           fill="none" stroke="#0D1117" stroke-width="1.2"
           stroke-linejoin="round" opacity="0.35"/>

  <!-- Needle: tapered shaft with a real cut-out eye via mask -->
  <path d="M 62 36 L 59.5 46 L 59.5 82 L 64.5 82 L 64.5 46 Z"
        fill="#0D1117" mask="url(#needleEye)"/>

  <!-- Wordmark: single text element with tspan keeps -rs perfectly aligned across all fonts -->
  <text x="112" y="64"
        font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace"
        font-size="40" font-weight="600" letter-spacing="-1.2"
        fill="#E6EDF3">needle<tspan fill="#CE422B" font-weight="700">-rs</tspan></text>

  <!-- Tagline (no hardcoded metric — it stays accurate as the project evolves) -->
  <text x="114" y="88"
        font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace"
        font-size="11" font-weight="500" fill="#7D8590" letter-spacing="2.2">AI TOOL CALLING · WASM · NO_STD</text>
</svg>
