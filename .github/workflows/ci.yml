name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude needle-python --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude needle-wasm --exclude needle-python

  test-aarch64:
    name: test (linux aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build (aarch64)
        run: cargo build --release --target aarch64-unknown-linux-gnu --workspace --exclude needle-wasm --exclude needle-python
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  wasm:
    name: wasm-pack build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.12.1 --locked
      # npm binaryen ships v120+ with all required flags; apt ships v108 (too old).
      - name: Install binaryen
        run: npm install -g binaryen
      - name: Build WASM (nodejs target — required by node_e2e.js CommonJS tests)
        run: wasm-pack build crates/needle-wasm --target nodejs --release --out-dir ../../pkg-nodejs/
      - name: Optimise WASM
        run: |
          wasm-opt pkg-nodejs/needle_wasm_bg.wasm -Oz \
            --enable-bulk-memory --enable-bulk-memory-opt --enable-mutable-globals \
            --enable-sign-ext --enable-nontrapping-float-to-int \
            -o pkg-nodejs/needle_wasm_bg.wasm
          echo "WASM size after wasm-opt: $(wc -c < pkg-nodejs/needle_wasm_bg.wasm) bytes"
      - name: Run WASM Node.js tests (no weights — smoke only)
        run: node crates/needle-wasm/tests/node_e2e.js --no-weights || true
        # Full parity tests require weights; see the parity job below.

  # ── Parity tests (requires HF_TOKEN secret) ────────────────────────────
  parity:
    name: parity tests (with weights)
    runs-on: ubuntu-latest
    # Only runs on the main repo — forks won't have the HF_TOKEN secret.
    if: github.repository == 'geekgineer/needle-rs'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download weights from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          huggingface-cli download Abdalrahman/needle-rs-safetensors \
            needle.safetensors vocab.txt --local-dir weights/

      - name: Run parity tests
        run: |
          cargo test -p needle-infer --test e2e_parity -- --nocapture
          cargo test -p needle-infer --test real_parity -- --nocapture
