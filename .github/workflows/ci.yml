name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude needle-wasm

  test-aarch64:
    name: test (linux aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build (aarch64)
        run: cargo build --release --target aarch64-unknown-linux-gnu --exclude needle-wasm
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  wasm:
    name: wasm-pack build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.12.1 --locked
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/needle-wasm --target nodejs --release --out-dir ../../pkg/
      - name: Optimise WASM
        run: |
          wasm-opt -Oz \
            --enable-bulk-memory --enable-mutable-globals --enable-sign-ext \
            --enable-nontrapping-float-to-int --enable-multivalue --enable-reference-types \
            pkg/needle_wasm_bg.wasm -o pkg/needle_wasm_bg.wasm
          echo "WASM size after wasm-opt: $(wc -c < pkg/needle_wasm_bg.wasm) bytes"
      - name: Run WASM Node.js tests (no weights — smoke only)
        run: node crates/needle-wasm/tests/node_e2e.js --no-weights || true
        # Full parity tests require weights; CI runs smoke tests only.
        # See BENCHMARKS.md for full test reproduction with weights.
