name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  # ── Native binaries: CLI + C shared + C static ──────────────────────────
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (aarch64 Linux only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build CLI binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p needle-cli --target ${{ matrix.target }}
          else
            cargo build --release -p needle-cli --target ${{ matrix.target }}
          fi

      - name: Build C library (shared + static)
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p needle-c --target ${{ matrix.target }}
          else
            cargo build --release -p needle-c --target ${{ matrix.target }}
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          D="target/${{ matrix.target }}/release"
          TAG="${{ github.ref_name }}"
          T="${{ matrix.target }}"
          OS="${{ matrix.runner }}"

          # CLI binary
          if [ "$OS" = "windows-latest" ]; then
            cp "$D/needle-rs.exe" "dist/needle-rs-${TAG}-${T}.exe"
          else
            cp "$D/needle-rs" "dist/needle-rs-${TAG}-${T}"
            chmod +x "dist/needle-rs-${TAG}-${T}"
          fi

          # C shared library
          case "$OS" in
            windows-latest) cp "$D/needle_c.dll"      "dist/libneedle_c-${TAG}-${T}.dll"   2>/dev/null || true ;;
            macos-latest)   cp "$D/libneedle_c.dylib" "dist/libneedle_c-${TAG}-${T}.dylib" 2>/dev/null || true ;;
            *)              cp "$D/libneedle_c.so"    "dist/libneedle_c-${TAG}-${T}.so"    2>/dev/null || true ;;
          esac

          # C static library
          case "$OS" in
            windows-latest) cp "$D/needle_c.lib"    "dist/libneedle_c-${TAG}-${T}.lib" 2>/dev/null || true ;;
            *)              cp "$D/libneedle_c.a"    "dist/libneedle_c-${TAG}-${T}.a"   2>/dev/null || true ;;
          esac

          # C header — identical for all targets; deduplicate at release time
          cp crates/needle-c/include/needle.h "dist/needle-${TAG}.h" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  # ── WASM (web target) ───────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: cargo install wasm-pack --version 0.12.1 --locked

      # Install binaryen via npm — gets v120+; apt ships v108 which lacks
      # --enable-bulk-memory-opt and other flags we depend on.
      - run: npm install -g binaryen

      - run: wasm-pack build crates/needle-wasm --target web --release --out-dir ../../pkg/

      - name: Restore pkg/package.json with release version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          version = os.environ["TAG"].lstrip("v")
          pkg = {
              "name": "needle-rs",
              "version": version,
              "description": "258 KB WASM runtime for Needle — a 26M-parameter tool-calling transformer. Runs in the browser, Cloudflare Workers, and Node.js. No backend required.",
              "license": "MIT",
              "repository": {"type": "git", "url": "git+https://github.com/geekgineer/needle-rs.git"},
              "homepage": "https://github.com/geekgineer/needle-rs",
              "keywords": ["wasm","webassembly","ai","llm","tool-calling","function-calling","transformer","rust","no-backend","browser-ai"],
              "files": ["needle_wasm_bg.wasm","needle_wasm_bg.wasm.d.ts","needle_wasm.js","needle_wasm.d.ts"],
              "module": "needle_wasm.js",
              "types": "needle_wasm.d.ts",
              "exports": {".": {"import": "./needle_wasm.js","types": "./needle_wasm.d.ts"}},
              "sideEffects": False
          }
          open("pkg/package.json", "w").write(json.dumps(pkg, indent=2) + "\n")
          print(f"pkg/package.json set to version {version}")
          PYEOF

      - name: Optimise WASM
        run: |
          wasm-opt pkg/needle_wasm_bg.wasm -Oz \
            --enable-bulk-memory --enable-bulk-memory-opt --enable-mutable-globals \
            --enable-sign-ext --enable-nontrapping-float-to-int \
            -o pkg/needle_wasm_bg.wasm
          echo "WASM size: $(wc -c < pkg/needle_wasm_bg.wasm) bytes"

      - name: Stage WASM release artifact
        run: |
          mkdir -p dist
          TAG="${{ github.ref_name }}"
          cp pkg/needle_wasm_bg.wasm "dist/needle_wasm-${TAG}.wasm"
          cp pkg/needle_wasm.js      "dist/needle_wasm-${TAG}.js"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wasm
          path: dist/

      # Preserve the full pkg/ for the npm-publish job (avoids rebuilding)
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-npm
          path: pkg/

  # ── GitHub release ──────────────────────────────────────────────────────
  github-release:
    name: Create GitHub release
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── Cloudflare Pages demo deploy ────────────────────────────────────────
  deploy-demo:
    name: Deploy demo to Cloudflare Pages
    needs: [build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pkg-npm
          path: pkg/

      - name: Assemble demo site
        run: |
          mkdir -p _site
          cp -r examples/browser-demo/* _site/
          cp -r pkg/ _site/pkg/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          preCommands: >
            npx wrangler pages project create needle-rs
            --production-branch=main 2>/dev/null || true
          command: pages deploy _site --project-name=needle-rs --branch=main --commit-dirty=true

  # ── npm publish ─────────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    needs: [build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: pkg-npm
          path: pkg/

      - name: Publish needle-rs to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "needle-rs@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "needle-rs@${VERSION} already published — skipping"
          else
            npm publish --access public
          fi
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── PyPI publish (maturin + cibuildwheel) ──────────────────────────────
  python-publish:
    name: Build Python wheels (${{ matrix.os }})
    needs: [github-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.19.2

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          # Build for CPython 3.8–3.12; skip Linux aarch64 (QEMU emulation is too slow)
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          # maturin is the build backend; cibuildwheel invokes it via pip
          CIBW_BEFORE_ALL_LINUX: "curl https://sh.rustup.rs -sSf | sh -s -- -y && source $HOME/.cargo/env"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_BEFORE_ALL_MACOS: "rustup target add x86_64-apple-darwin aarch64-apple-darwin"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET="10.12"'

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: dist/*.whl

  python-publish-upload:
    name: Publish Python wheels to PyPI
    needs: [python-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install twine

      - name: Upload to PyPI
        run: twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── crates.io publish ───────────────────────────────────────────────────
  crates-publish:
    name: Publish to crates.io
    needs: [github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish leaf-first; sleep 45 s between each so crates.io indexes
          # before the next crate tries to resolve it as a dependency.
          cargo publish -p needle-core
          sleep 45
          cargo publish -p needle-infer
          sleep 45
          cargo publish -p needle-c
          sleep 45
          cargo publish -p needle-cli
